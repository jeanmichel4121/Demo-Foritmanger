[defaults]
# Inventaire par defaut
inventory = inventory/hosts.yml

# Desactiver la verification des cles SSH (lab)
host_key_checking = False

# Roles path
roles_path = roles

# Timeout de connexion
timeout = 30

# Affichage des taches changees
display_ok_hosts = yes
display_skipped_hosts = no

# Callbacks pour un affichage plus lisible
stdout_callback = yaml
callbacks_enabled = profile_tasks

# Ne pas creer de fichiers .retry
retry_files_enabled = False

[inventory]
# Activer les plugins d'inventaire YAML
enable_plugins = yaml, ini

[privilege_escalation]
become = False
