---
# Variables for the 'fortimanager' group
#
# IMPORTANT: Do not commit secrets!
# Use ansible-vault for passwords/API keys

# =============================================================================
# CONNECTION
# =============================================================================
ansible_host: "{{ lookup('env', 'FMG_HOST') | default('192.168.1.100', true) }}"

# Username/password authentication
ansible_user: "{{ lookup('env', 'FMG_USERNAME') | default('admin', true) }}"
ansible_password: "{{ lookup('env', 'FMG_PASSWORD') | default('', true) }}"

# OR API Key authentication (uncomment and comment above)
# ansible_httpapi_key: "{{ lookup('env', 'FMG_API_KEY') }}"

# =============================================================================
# FMG CONFIGURATION
# =============================================================================
fmg_adom: "{{ lookup('env', 'FMG_ADOM') | default('root', true) }}"
fmg_package: "default"

# =============================================================================
# OPTIONS
# =============================================================================
# Workspace mode (FMG 7.0+)
fmg_workspace_locking_adom: "{{ fmg_adom }}"
fmg_workspace_locking_timeout: 300

# Debug
fmg_debug: false
