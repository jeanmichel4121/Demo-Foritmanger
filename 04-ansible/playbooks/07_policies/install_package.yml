---
# install_package.yml
#
# Playbook for installing a policy package to FortiGate devices
#
# Usage:
#   # Install to all devices in the package
#   ansible-playbook playbooks/07_policies/install_package.yml
#
#   # Install to a specific device
#   ansible-playbook playbooks/07_policies/install_package.yml -e "target_device=FGT-01"
#
#   # Preview only (dry-run)
#   ansible-playbook playbooks/07_policies/install_package.yml -e "preview_only=true"

- name: Policy Package Installation
  hosts: fortimanager
  gather_facts: false
  connection: httpapi

  vars:
    target_device: ""  # Empty = all devices in the package
    preview_only: false

  tasks:
    # =========================================================================
    # Preview (optional)
    # =========================================================================
    - name: Preview changes
      fortinet.fortimanager.fmgr_securityconsole_install_preview:
        securityconsole_install_preview:
          adom: "{{ fmg_adom }}"
          device: "{{ target_device | default(omit) }}"
          flags:
            - "none"
      register: preview_result
      when: preview_only | bool
      tags:
        - preview

    - name: Display preview
      ansible.builtin.debug:
        var: preview_result
      when: preview_only | bool
      tags:
        - preview

    # =========================================================================
    # Installation
    # =========================================================================
    - name: Install policy package to specific device
      fortinet.fortimanager.fmgr_securityconsole_install_package:
        securityconsole_install_package:
          adom: "{{ fmg_adom }}"
          pkg: "{{ fmg_package }}"
          scope:
            - name: "{{ target_device }}"
              vdom: "root"
      register: install_result
      when:
        - not (preview_only | bool)
        - target_device | length > 0
      tags:
        - install

    - name: Install to all devices in the package
      fortinet.fortimanager.fmgr_securityconsole_install_package:
        securityconsole_install_package:
          adom: "{{ fmg_adom }}"
          pkg: "{{ fmg_package }}"
      register: install_result_all
      when:
        - not (preview_only | bool)
        - target_device | length == 0
      tags:
        - install

    # =========================================================================
    # Result
    # =========================================================================
    - name: Display installation result
      ansible.builtin.debug:
        msg: |
          ========================================
          INSTALLATION STARTED
          ========================================
          ADOM: {{ fmg_adom }}
          Package: {{ fmg_package }}
          Device: {{ target_device | default('All') }}

          Installation is running in the background.
          Check FortiManager for progress.
          ========================================
      when: not (preview_only | bool)
      tags:
        - install
