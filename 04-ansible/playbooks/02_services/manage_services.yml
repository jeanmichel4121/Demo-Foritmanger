---
# manage_services.yml
#
# Playbook for managing FortiManager services
#
# Usage:
#   ansible-playbook playbooks/02_services/manage_services.yml

- name: FortiManager Service Management
  hosts: fortimanager
  gather_facts: false
  connection: httpapi

  vars_files:
    - ../../vars/services.yml

  tasks:
    # =========================================================================
    # Custom Services
    # =========================================================================
    - name: Manage custom services
      fortinet.fortimanager.fmgr_firewall_service_custom:
        state: "{{ item.state | default('present') }}"
        adom: "{{ fmg_adom }}"
        firewall_service_custom:
          name: "{{ item.name }}"
          protocol: "TCP/UDP/SCTP"
          tcp-portrange: "{{ item.tcp_portrange | default(omit) }}"
          udp-portrange: "{{ item.udp_portrange | default(omit) }}"
          comment: "{{ item.comment | default(omit) }}"
      loop: "{{ services_custom | default([]) }}"
      tags:
        - services
        - custom

    # =========================================================================
    # Service Groups
    # =========================================================================
    - name: Manage service groups
      fortinet.fortimanager.fmgr_firewall_service_group:
        state: "{{ item.state | default('present') }}"
        adom: "{{ fmg_adom }}"
        firewall_service_group:
          name: "{{ item.name }}"
          member: "{{ item.members }}"
          comment: "{{ item.comment | default(omit) }}"
      loop: "{{ service_groups | default([]) }}"
      tags:
        - services
        - groups

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Summary
      ansible.builtin.debug:
        msg: |
          Custom services: {{ services_custom | default([]) | length }}
          Groups: {{ service_groups | default([]) | length }}
      tags:
        - always
