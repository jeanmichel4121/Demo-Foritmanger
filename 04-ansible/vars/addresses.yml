---
# Address definitions to create/manage
#
# These variables are used by the address management playbooks.
# Modify this file to add/remove addresses.

# =============================================================================
# IPv4 Addresses (type ipmask)
# =============================================================================
addresses_ipv4:
  - name: "NET_SERVERS_WEB"
    subnet: "10.10.10.0/24"
    comment: "Frontend web servers"
    state: present

  - name: "NET_SERVERS_APP"
    subnet: "10.10.20.0/24"
    comment: "Application servers"
    state: present

  - name: "NET_SERVERS_DB"
    subnet: "10.10.30.0/24"
    comment: "Database servers"
    state: present

  - name: "NET_MGMT"
    subnet: "10.0.0.0/24"
    comment: "Management network"
    state: present

  - name: "HOST_DNS_PRIMARY"
    subnet: "10.0.0.10/32"
    comment: "Primary DNS server"
    state: present

  - name: "HOST_DNS_SECONDARY"
    subnet: "10.0.0.11/32"
    comment: "Secondary DNS server"
    state: present

# =============================================================================
# IPv6 Addresses (type ipprefix)
# =============================================================================
addresses_ipv6:
  - name: "NET6_SERVERS"
    ip6: "2001:db8:10::/48"
    comment: "IPv6 server network"
    state: present

# =============================================================================
# Address Groups
# =============================================================================
address_groups:
  - name: "GRP_SERVERS_ALL"
    members:
      - "NET_SERVERS_WEB"
      - "NET_SERVERS_APP"
      - "NET_SERVERS_DB"
    comment: "All servers"
    state: present

  - name: "GRP_DNS"
    members:
      - "HOST_DNS_PRIMARY"
      - "HOST_DNS_SECONDARY"
    comment: "DNS servers"
    state: present
